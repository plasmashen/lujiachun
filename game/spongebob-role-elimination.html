<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角色消除游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .info-item {
            text-align: center;
        }

        .info-item h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .info-item .value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .info-item .value.highlight {
            color: #e74c3c;
        }

        .cards-area {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 30px 0;
            flex-wrap: wrap;
            min-height: 180px;
            align-items: center;
        }

        .card {
            width: 80px;
            height: 110px;
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            color: #333;
            border: 3px solid #ddd;
            box-shadow: 3px 3px 8px rgba(0,0,0,0.2);
            animation: flipIn 0.5s ease-out;
            position: relative;
        }

        @keyframes flipIn {
            from {
                transform: rotateY(180deg) scale(0.5);
                opacity: 0;
            }
            to {
                transform: rotateY(0) scale(1);
                opacity: 1;
            }
        }

        .card.empty {
            background: linear-gradient(145deg, #f0f0f0, #e0e0e0);
            border: 3px dashed #ccc;
        }

        .empty-text {
            font-size: 16px;
            color: #999;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(145deg, #3498db, #2980b9);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(145deg, #5dade2, #3498db);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .btn-success {
            background: linear-gradient(145deg, #27ae60, #1e8449);
            color: white;
        }

        .btn-success:hover {
            background: linear-gradient(145deg, #58d68d, #27ae60);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
        }

        .btn-warning {
            background: linear-gradient(145deg, #f39c12, #e67e22);
            color: white;
        }

        .btn-warning:hover {
            background: linear-gradient(145deg, #f8c471, #f39c12);
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .result-panel {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .result-panel.show {
            display: block;
        }

        .result-panel.win {
            background: linear-gradient(145deg, #d4edda, #c3e6cb);
            border: 2px solid #28a745;
        }

        .result-panel.lose {
            background: linear-gradient(145deg, #f8d7da, #f5c6cb);
            border: 2px solid #dc3545;
        }

        .result-panel.normal {
            background: linear-gradient(145deg, #fff3cd, #ffeaa7);
            border: 2px solid #ffc107;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .result-value {
            font-size: 48px;
            font-weight: bold;
            color: #e74c3c;
            margin: 15px 0;
        }

        .result-cards {
            font-size: 18px;
            color: #666;
            margin-bottom: 15px;
        }

        .deck-info {
            text-align: center;
            margin-top: 15px;
            color: #666;
        }

        .rules {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .rules h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .rules ul {
            list-style-position: inside;
            color: #666;
        }

        .rules li {
            margin: 5px 0;
        }

        .prize-table {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .prize-table h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .prize-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
            font-size: 14px;
        }

        .prize-item {
            padding: 8px;
            background: #fff;
            border-radius: 4px;
            border: 1px solid #ddd;
        }

        .prize-item.high {
            background: #d4edda;
            border-color: #28a745;
            font-weight: bold;
        }

        .prize-item.medium {
            background: #fff3cd;
            border-color: #ffc107;
        }

        .role-selection {
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: center;
        }

        .role-selection h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .role-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 300px;
            margin: 0 auto;
        }

        .role-option {
            padding: 15px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 24px;
            font-weight: bold;
        }

        .role-option:hover {
            border-color: #3498db;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .role-option.selected {
            background: #3498db;
            color: white;
            border-color: #2980b9;
        }

        .elimination-counter {
            margin: 20px 0;
            padding: 15px;
            background: #e8f4f8;
            border-radius: 10px;
            text-align: center;
        }

        .elimination-counter h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .elimination-value {
            font-size: 36px;
            font-weight: bold;
            color: #e74c3c;
        }

        .current-hand {
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .current-hand h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .hand-cards {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            min-height: 100px;
            align-items: center;
        }

        .hand-card {
            width: 70px;
            height: 90px;
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: #333;
            border: 2px solid #ddd;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }

        .elimination-animation {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #e74c3c;
            font-weight: bold;
            animation: pulse 0.5s ease-in-out;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0;
            }
        }

        .test-area {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .test-controls {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .test-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .test-buttons button {
            padding: 8px 15px;
            font-size: 14px;
        }

        .test-results {
            margin-top: 15px;
        }

        .test-results h4 {
            color: #333;
            margin-bottom: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            margin-bottom: 10px;
        }

        .stat-item {
            padding: 8px;
            background: #fff;
            border-radius: 4px;
            border: 1px solid #ddd;
            text-align: center;
            font-size: 14px;
        }

        .stat-item.high {
            background: #d4edda;
            border-color: #28a745;
            font-weight: bold;
        }

        .stat-item.medium {
            background: #fff3cd;
            border-color: #ffc107;
        }

        .test-summary {
            padding: 10px;
            background: #e8f4f8;
            border-radius: 6px;
            border: 1px solid #b8d4e3;
            font-size: 14px;
            color: #495057;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>海绵宝宝角色消除游戏</h1>

        <div class="game-container">
            <div class="role-selection">
                <h3>选择许愿角色</h3>
                <div class="role-grid" id="roleGrid"></div>
            </div>

            <div class="info-panel">
                <div class="info-item">
                    <h3>许愿角色</h3>
                    <div class="value" id="targetRole">-</div>
                </div>
                <div class="info-item">
                    <h3>初始手牌数</h3>
                    <div class="value" id="initialHandSize">9</div>
                </div>
                <div class="info-item">
                    <h3>当前手牌数</h3>
                    <div class="value" id="currentHandSize">0</div>
                </div>
                <div class="info-item">
                    <h3>消除次数</h3>
                    <div class="value" id="eliminationCount">0</div>
                </div>
                <div class="info-item">
                    <h3>预期奖励</h3>
                    <div class="value" id="expectedPrize">-</div>
                </div>
            </div>

            <div class="current-hand">
                <h3>当前手牌</h3>
                <div class="hand-cards" id="handCards"></div>
            </div>

            <div class="elimination-counter">
                <h3>消除次数统计</h3>
                <div class="elimination-value" id="eliminationValue">0</div>
            </div>

            <div class="controls">
                <button class="btn-primary" id="startButton" onclick="startGame()">
                    开始游戏
                </button>
                <button class="btn-success" id="eliminateButton" onclick="eliminatePair()" disabled>
                    消除对子
                </button>
                <button class="btn-warning" id="resetButton" onclick="resetGame()">
                    重新开始
                </button>
            </div>

            <div class="deck-info">
                牌堆剩余：<span id="deckCount">54</span> 张
            </div>

            <div class="result-panel" id="resultPanel">
                <div class="result-title" id="resultTitle"></div>
                <div class="result-cards" id="resultCards"></div>
                <div class="result-value" id="resultValue"></div>
                <button class="btn-primary" onclick="resetGame()">再来一局</button>
            </div>

            <div class="prize-table">
                <h3>奖励表</h3>
                <div class="prize-grid" id="prizeGrid"></div>
            </div>

            <div class="rules">
                <h3>游戏规则</h3>
                <ul>
                    <li>有 9 种海绵宝宝角色，每种角色 7 张牌，一共 63 张牌</li>
                    <li>先许愿一个海绵宝宝角色，然后发 9 张牌</li>
                    <li>统计许愿海绵宝宝角色出现次数 n，多发 n 张牌（共 9+n 张）</li>
                    <li>消除对子：找到两张相同海绵宝宝角色，消除后补发 1 张牌</li>
                    <li>游戏结束条件：没有对子可消除或牌堆为空</li>
                    <li>根据消除次数获得对应奖励</li>
                </ul>
            </div>

            <div class="test-area">
                <h3>自动化测试</h3>
                <div class="test-controls">
                    <div class="test-buttons">
                        <button class="btn-primary" onclick="runTest(1)">随机测试 1 次</button>
                        <button class="btn-primary" onclick="runTest(100)">随机测试 100 次</button>
                        <button class="btn-primary" onclick="runTest(10000)">随机测试 10000 次</button>
                        <button class="btn-primary" onclick="runCustomTest()">自定义次数测试</button>
                        <input type="number" id="customTestCount" value="1000" min="1" max="100000" style="width: 80px; margin-left: 10px;">
                    </div>
                </div>
                <div class="test-results">
                    <h4>测试结果统计</h4>
                    <div class="stats-grid" id="statsGrid"></div>
                    <div class="test-summary" id="testSummary"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 游戏配置
        const ROLE_COUNT = 9;
        const CARDS_PER_ROLE = 7;
        const INITIAL_HAND_SIZE = 9;
        const MAX_ELIMINATIONS = 13;

        // 奖励映射表
        const prizeMap = {
            0: 500,
            1: 200,
            2: 100,
            3: 5,
            4: 5,
            5: 5,
            6: 5,
            7: 75,
            8: 75,
            9: 75,
            10: 75,
            11: 187.5,
            12: 187.5,
            13: 500
        };

        let deck = [];
        let hand = [];
        let targetRole = null;
        let eliminationCount = 0;
        let isGameActive = false;
        let isTestRunning = false;

        // 中奖记录相关变量
        let winRecords = [];
        let totalPrize = 0;
        let gameCount = 0;

        // 自动化测试相关变量
        let testRunning = false;
        let testResults = {
            eliminations: {},
            prizes: []
        };

        function initDeck() {
            deck = [];
            // 初始化牌堆：每种角色 7 张
            for (let r = 0; r < ROLE_COUNT; r++) {
                for (let i = 0; i < CARDS_PER_ROLE; i++) {
                    deck.push(r);
                }
            }
            // 洗牌
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
        }

        function initRoleSelection() {
            const roleGrid = document.getElementById('roleGrid');
            roleGrid.innerHTML = '';

            const spongebobCharacters = ['海绵宝宝', '派大星', '章鱼哥', '蟹老板', '痞老板', '珊迪', '珍珍', '泡芙老师', '小蜗'];

            for (let r = 0; r < ROLE_COUNT; r++) {
                const roleOption = document.createElement('div');
                roleOption.className = 'role-option';
                roleOption.textContent = spongebobCharacters[r];
                roleOption.onclick = () => selectRole(r);
                roleGrid.appendChild(roleOption);
            }
        }

        function selectRole(role) {
            if (isGameActive) return;

            targetRole = role;
            const spongebobCharacters = ['海绵宝宝', '派大星', '章鱼哥', '蟹老板', '痞老板', '珊迪', '珍珍', '泡芙老师', '小蜗'];
            document.getElementById('targetRole').textContent = spongebobCharacters[role];

            // 更新角色选择界面
            const roleOptions = document.querySelectorAll('.role-option');
            roleOptions.forEach((option, index) => {
                if (index === role) {
                    option.classList.add('selected');
                } else {
                    option.classList.remove('selected');
                }
            });

            // 启用开始按钮
            document.getElementById('startButton').disabled = false;
        }

        function startGame() {
            if (targetRole === null || isGameActive) return;

            // 重置游戏状态
            deck = [];
            hand = [];
            eliminationCount = 0;
            isGameActive = false;

            document.getElementById('resultPanel').className = 'result-panel';
            document.getElementById('eliminateButton').disabled = true;

            initDeck();
            updateDisplay();

            isGameActive = true;

            // 发初始 9 张牌
            hand = deck.splice(0, INITIAL_HAND_SIZE);

            // 统计许愿角色出现次数
            const n = hand.filter(card => card === targetRole).length;

            // 多发 n 张牌
            if (n > 0 && deck.length >= n) {
                hand.push(...deck.splice(0, n));
            }

            // 更新显示
            updateDisplay();

            // 启用消除按钮
            document.getElementById('eliminateButton').disabled = false;
        }

        function eliminatePair() {
            if (!isGameActive || hand.length < 2) return;

            // 查找对子
            const counts = {};
            for (const card of hand) {
                counts[card] = (counts[card] || 0) + 1;
            }

            const pairs = Object.entries(counts).filter(([_, count]) => count >= 2);

            if (pairs.length === 0) {
                // 没有对子，游戏结束
                endGame();
                return;
            }

            // 随机选择一个对子消除
            const [roleToEliminate] = pairs[Math.floor(Math.random() * pairs.length)];
            const roleIndex = parseInt(roleToEliminate);

            // 从手牌中移除恰好两张该角色
            let removedCount = 0;
            const newHand = [];
            for (const card of hand) {
                if (card === roleIndex && removedCount < 2) {
                    removedCount++;
                } else {
                    newHand.push(card);
                }
            }
            hand = newHand;

            eliminationCount++;

            // 补发 1 张牌
            if (deck.length > 0) {
                const drawnCard = deck.shift();
                hand.push(drawnCard);

                // 如果补的牌是许愿角色，需要再补一张
                if (drawnCard === targetRole && deck.length > 0) {
                    hand.push(deck.shift());
                }
            }

            // 更新显示
            updateDisplay();

            // 检查游戏是否结束
            if (hand.length < 2) {
                endGame();
                return;
            }

            // 检查是否还有对子可消除
            const remainingCounts = {};
            for (const card of hand) {
                remainingCounts[card] = (remainingCounts[card] || 0) + 1;
            }
            const hasPair = Object.values(remainingCounts).some(count => count >= 2);
            if (!hasPair) {
                endGame();
                return;
            }

            // 牌堆为空时
            if (deck.length === 0) {
                endGame();
            }
        }

        function endGame() {
            isGameActive = false;
            document.getElementById('eliminateButton').disabled = true;

            const prize = prizeMap[eliminationCount] || 0;

            const resultPanel = document.getElementById('resultPanel');
            const resultTitle = document.getElementById('resultTitle');
            const resultCards = document.getElementById('resultCards');
            const resultValue = document.getElementById('resultValue');

            resultTitle.textContent = '游戏结束！';
            resultTitle.style.color = '#e74c3c';
            resultCards.textContent = `消除次数：${eliminationCount}`;
            resultValue.textContent = `💰 ${prize} 元`;

            resultPanel.className = 'result-panel show win';

            // 记录中奖
            recordWin(prize);
        }

        function updateDisplay() {
            // 更新手牌显示
            const handCards = document.getElementById('handCards');
            handCards.innerHTML = '';

            const spongebobCharacters = ['海绵宝宝', '派大星', '章鱼哥', '蟹老板', '痞老板', '珊迪', '珍珍', '泡芙老师', '小蜗'];

            for (const card of hand) {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'hand-card';
                cardDiv.textContent = spongebobCharacters[card];
                handCards.appendChild(cardDiv);
            }

            // 更新统计信息
            document.getElementById('currentHandSize').textContent = hand.length;
            document.getElementById('deckCount').textContent = deck.length;
            document.getElementById('eliminationCount').textContent = eliminationCount;

            // 更新预期奖励
            const expectedPrize = prizeMap[eliminationCount] || 0;
            document.getElementById('expectedPrize').textContent = expectedPrize;

            // 更新消除次数显示
            document.getElementById('eliminationValue').textContent = eliminationCount;
        }

        function resetGame() {
            deck = [];
            hand = [];
            targetRole = null;
            eliminationCount = 0;
            isGameActive = false;

            document.getElementById('resultPanel').className = 'result-panel';
            document.getElementById('eliminateButton').disabled = true;
            document.getElementById('startButton').disabled = true;

            initDeck();
            initRoleSelection();
            updateDisplay();
        }

        function recordWin(prize) {
            // 确保 prize 是数字
            const prizeNum = parseFloat(prize);
            if (isNaN(prizeNum)) return;

            winRecords.push(prizeNum);
            totalPrize += prizeNum;
            gameCount++;
            updateWinRecordDisplay();
        }

        function updateWinRecordDisplay() {
            const avgPrize = gameCount > 0 ? (totalPrize / gameCount).toFixed(2) : 0;
            document.getElementById('avgPrize').textContent = avgPrize;
            document.getElementById('totalGames').textContent = gameCount;
            document.getElementById('totalPrize').textContent = totalPrize.toFixed(2);
        }

        function initPrizeTable() {
            const prizeGrid = document.getElementById('prizeGrid');
            prizeGrid.innerHTML = '';

            for (let elim = 0; elim <= MAX_ELIMINATIONS; elim++) {
                const prize = prizeMap[elim];
                const item = document.createElement('div');
                item.className = 'prize-item';

                if (prize >= 100) {
                    item.classList.add('high');
                } else if (prize >= 50) {
                    item.classList.add('medium');
                }

                item.textContent = `${elim}次：${prize}元`;
                prizeGrid.appendChild(item);
            }
        }

        // 运行测试
        function runTest(times) {
            if (testRunning) return;

            testRunning = true;
            testResults = {
                eliminations: {},
                prizes: []
            };

            // 初始化统计
            for (let i = 0; i <= MAX_ELIMINATIONS; i++) {
                testResults.eliminations[i] = 0;
            }
            testResults.eliminations['>13'] = 0;

            let completed = 0;

            function runNextTest() {
                if (completed < times) {
                    performSingleTest();

                    // 等待游戏结束
                    setTimeout(() => {
                        const elim = eliminationCount;
                        let prize = 0;

                        if (elim > MAX_ELIMINATIONS) {
                            testResults.eliminations['>13']++;
                        } else {
                            testResults.eliminations[elim]++;
                            prize = prizeMap[elim] || 0;
                            testResults.prizes.push(prize);
                        }

                        completed++;

                        // 更新显示
                        updateTestResults();

                        if (completed < times) {
                            runNextTest();
                        } else {
                            testRunning = false;
                            showTestSummary(times);
                        }
                    }, 50);
                }
            }

            runNextTest();
        }

        // 运行自定义次数测试
        function runCustomTest() {
            const count = parseInt(document.getElementById('customTestCount').value) || 1000;
            runTest(count);
        }

        // 执行单次测试
        function performSingleTest() {
            resetGame();

            // 随机选择角色
            const randomRole = Math.floor(Math.random() * ROLE_COUNT);
            selectRole(randomRole);

            // 开始游戏
            startGame();
        }

        // 更新测试结果统计
        function updateTestResults() {
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = '';

            // 显示消除次数分布
            for (let elim = 0; elim <= MAX_ELIMINATIONS; elim++) {
                const count = testResults.eliminations[elim] || 0;
                const item = document.createElement('div');
                item.className = 'stat-item';
                if (count > 0) {
                    if (count > 100) {
                        item.classList.add('high');
                    } else if (count > 50) {
                        item.classList.add('medium');
                    }
                }
                item.textContent = `${elim}次：${count}`;
                statsGrid.appendChild(item);
            }

            const over13Count = testResults.eliminations['>13'] || 0;
            const over13Item = document.createElement('div');
            over13Item.className = 'stat-item';
            over13Item.style.background = '#f8d7da';
            over13Item.style.borderColor = '#dc3545';
            over13Item.textContent = '>13 次：' + over13Count;
            statsGrid.appendChild(over13Item);

            // 计算并显示平均奖励
            const totalPrizes = testResults.prizes.length;
            if (totalPrizes > 0) {
                const totalAmount = testResults.prizes.reduce((sum, prize) => sum + prize, 0);
                const avgPrize = (totalAmount / totalPrizes).toFixed(2);
                const avgItem = document.createElement('div');
                avgItem.className = 'stat-item';
                avgItem.style.background = '#e8f4f8';
                avgItem.style.borderColor = '#28a745';
                avgItem.textContent = `平均奖励：${avgPrize} 元`;
                statsGrid.appendChild(avgItem);
            }
        }

        // 显示测试总结
        function showTestSummary(times) {
            const summary = document.getElementById('testSummary');

            // 计算统计数据
            let totalGames = 0;
            for (let elim in testResults.eliminations) {
                totalGames += testResults.eliminations[elim];
            }

            const totalPrizes = testResults.prizes.length;
            let avgPrizeText = '';
            if (totalPrizes > 0) {
                const totalAmount = testResults.prizes.reduce((sum, prize) => sum + prize, 0);
                const avgPrize = (totalAmount / totalPrizes).toFixed(2);
                avgPrizeText = `平均奖励：${avgPrize} 元 | `;
            }

            // 简化测试结果文本
            let summaryText = `测试完成！共运行 ${times} 局，${avgPrizeText}总统计：${totalGames} 局`;

            summary.textContent = summaryText;
        }

        // 初始化游戏
        initDeck();
        initRoleSelection();
        initPrizeTable();
        updateDisplay();
    </script>
</body>
</html>
