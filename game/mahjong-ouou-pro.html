<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>49.9 麻将欧欧乐 - 专业版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .game-container {
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            background: linear-gradient(135deg, #ffd700 0%, #ff6b6b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 25px;
            font-size: 1.1em;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tab-btn {
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #ffd700 0%, #ff6b6b 100%);
            border-color: #ffd700;
            color: #000;
        }

        .tab-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .money-display {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .money-box {
            background: linear-gradient(135deg, #2d3436 0%, #000000 100%);
            border: 3px solid #ffd700;
            border-radius: 15px;
            padding: 15px 30px;
            text-align: center;
            min-width: 180px;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.3);
        }

        .money-box label {
            display: block;
            color: #aaa;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .money-box .value {
            font-size: 2em;
            font-weight: bold;
            color: #ffd700;
        }

        .money-box.cost {
            border-color: #ff6b6b;
        }

        .money-box.cost .value {
            color: #ff6b6b;
        }

        .money-box.win {
            border-color: #00ff88;
        }

        .money-box.win .value {
            color: #00ff88;
        }

        .info-bar {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255,215,0,0.1);
            border-radius: 15px;
            border: 2px solid rgba(255,215,0,0.2);
        }

        .info-item {
            text-align: center;
        }

        .info-item label {
            display: block;
            color: #aaa;
            font-size: 0.85em;
            margin-bottom: 5px;
        }

        .info-item .value {
            font-size: 1.5em;
            font-weight: bold;
            color: #fff;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            margin: 20px 0;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            border: 2px solid rgba(255, 215, 0, 0.2);
        }

        .tile {
            aspect-ratio: 3/4;
            background: linear-gradient(145deg, #2d3436 0%, #1a1a2e 100%);
            border: 3px solid #555;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .tile::before {
            content: '🀄';
            font-size: 3em;
            opacity: 0.1;
        }

        .tile:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
            border-color: #ffd700;
        }

        .tile.revealed {
            background: linear-gradient(145deg, #fffef8 0%, #f0e6d2 100%);
            border-color: #ffd700;
        }

        .tile.matched {
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
        }

        .tile-content {
            font-size: 1.8em;
            font-weight: bold;
            color: transparent;
        }

        .tile.revealed .tile-content {
            color: #333;
        }

        .tile-label {
            font-size: 0.7em;
            color: transparent;
            margin-top: 3px;
        }

        .tile.revealed .tile-label {
            color: #666;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .btn-reveal {
            background: linear-gradient(135deg, #ffd700 0%, #ff6b6b 100%);
            color: #000;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00ff88 0%, #00b862 100%);
            color: #000;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .panel {
            background: rgba(0, 0, 0, 0.3);
            padding: 25px;
            border-radius: 20px;
            margin-top: 20px;
            border: 2px solid rgba(255, 215, 0, 0.2);
        }

        .panel h3 {
            background: linear-gradient(135deg, #ffd700 0%, #ff6b6b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.5em;
        }

        .prize-config {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .prize-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .prize-item label {
            color: #fff;
            font-size: 0.95em;
        }

        .prize-item input {
            width: 80px;
            padding: 8px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.5);
            color: #ffd700;
            font-size: 1.1em;
            text-align: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 12px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            color: #aaa;
            font-size: 0.85em;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #ffd700;
            font-size: 1.3em;
            font-weight: bold;
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #ffd700 0%, #ff6b6b 100%);
            color: #000;
            padding: 40px 60px;
            border-radius: 25px;
            font-size: 2em;
            font-weight: bold;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            z-index: 1000;
            display: none;
            text-align: center;
        }

        .expect-box {
            background: linear-gradient(135deg, rgba(0,255,136,0.2) 0%, rgba(0,184,98,0.2) 100%);
            border: 2px solid #00ff88;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            text-align: center;
        }

        .expect-box .title {
            color: #aaa;
            font-size: 1em;
            margin-bottom: 10px;
        }

        .expect-box .value {
            color: #00ff88;
            font-size: 2.5em;
            font-weight: bold;
        }

        @media (max-width: 1024px) {
            .board {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        @media (max-width: 768px) {
            .board {
                grid-template-columns: repeat(4, 1fr);
            }
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🀄 49.9 麻将欧欧乐</h1>
        <p class="subtitle">💰 50 元看 3 张 · 后续 +10 元/张 · 自定义奖金</p>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('game')">🎮 游戏</button>
            <button class="tab-btn" onclick="switchTab('prize')">⚙️ 奖金设置</button>
            <button class="tab-btn" onclick="switchTab('stats')">📊 概率统计</button>
        </div>

        <!-- 游戏标签页 -->
        <div id="tab-game" class="tab-content active">
            <div class="money-display">
                <div class="money-box">
                    <label>💵 余额</label>
                    <div class="value" id="balance">1000</div>
                </div>
                <div class="money-box cost">
                    <label>💸 看牌费用</label>
                    <div class="value" id="current-cost">50</div>
                </div>
                <div class="money-box win">
                    <label>🏆 累计赢取</label>
                    <div class="value" id="total-win">0</div>
                </div>
            </div>

            <div class="info-bar">
                <div class="info-item">
                    <label>👁️ 已看牌</label>
                    <div class="value" id="revealed-count">0</div>
                </div>
                <div class="info-item">
                    <label>🎯 组合数</label>
                    <div class="value" id="combos">0</div>
                </div>
                <div class="info-item">
                    <label>🃏 剩余</label>
                    <div class="value" id="hidden-count">64</div>
                </div>
            </div>

            <div class="board" id="board"></div>

            <div class="controls">
                <button class="btn btn-reveal" id="btn-reveal" onclick="game.revealTiles()">👁️ 看牌 (50 元/3 张)</button>
                <button class="btn btn-primary" id="btn-check" onclick="game.checkCombo()" disabled>🎯 检查组合</button>
                <button class="btn btn-secondary" onclick="game.startNewGame()">🔄 新局</button>
            </div>
        </div>

        <!-- 奖金设置标签页 -->
        <div id="tab-prize" class="tab-content">
            <div class="panel">
                <h3>⚙️ 自定义奖金倍率</h3>
                <p style="text-align: center; color: #aaa; margin-bottom: 20px;">
                    设置各牌型的奖金倍率（分数 × 倍率 = 实际奖金）
                </p>
                <div class="prize-config" id="prize-config"></div>
                <div style="text-align: center;">
                    <button class="btn btn-primary" onclick="game.savePrizeConfig()">💾 保存设置</button>
                    <button class="btn btn-secondary" onclick="game.resetPrizeConfig()">🔄 重置默认</button>
                </div>
                <div class="expect-box" id="expect-display">
                    <div class="title">当前期望净收益</div>
                    <div class="value" id="expected-net">+265.17 元</div>
                    <div style="color: #aaa; margin-top: 10px;">RTP: <span id="rtp-value">139.19%</span></div>
                </div>
            </div>
        </div>

        <!-- 概率统计标签页 -->
        <div id="tab-stats" class="tab-content">
            <div class="panel">
                <h3>📊 蒙特卡洛模拟结果</h3>
                <p style="text-align: center; color: #aaa; margin-bottom: 20px;">
                    基于 10,000 次模拟统计
                </p>
                <div class="stats-grid" id="stats-grid"></div>
            </div>
        </div>
    </div>

    <div class="message" id="message"></div>

    <script>
        // 默认奖金倍率
        const DEFAULT_PRIZES = {
            '3 对 - 大天使': 145,
            '2 对 - 小米兰': 25,
            '7 顺 - 睡莲': 1000,
            '6 顺 - 睡莲': 400,
            '5 顺 - 熊猫': 400,
            '3 顺 - 南瓜': 33,
            '3 顺 - 国王象棋': 75,
            '4 顺 - 可口可乐': 2.5,
            '4 豹 - 情人节限定': 100,
            '3 豹 - IGO': 2.5,
            '马卡龙': 10,
            '妹宝烘培': 5,
            '我是大 boos': 5,
            '我爱吃果果': 5,
            'MIGO': 2.5
        };

        // 概率数据（来自蒙特卡洛模拟）
        const PROBABILITY_DATA = {
            'MIGO': { prob: 9.84, avgScore: 2.5 },
            '我爱吃果果': { prob: 4.91, avgScore: 5.0 },
            '我是大 boos': { prob: 4.90, avgScore: 5.0 },
            '马卡龙': { prob: 4.73, avgScore: 10.0 },
            '妹宝烘培': { prob: 4.70, avgScore: 5.0 },
            '3 顺 - 南瓜': { prob: 0.81, avgScore: 33.0 },
            '2 对 - 小米兰': { prob: 0.65, avgScore: 25.0 },
            '3 豹 - IGO': { prob: 0.21, avgScore: 2.5 },
            '4 顺 - 可口可乐': { prob: 0.05, avgScore: 2.5 },
            '5 顺 - 熊猫': { prob: 0.02, avgScore: 400.0 },
            '6 顺 - 睡莲': { prob: 0.01, avgScore: 400.0 },
            '7 顺 - 睡莲': { prob: 0.005, avgScore: 1000.0 },
            '4 豹 - 情人节限定': { prob: 0.003, avgScore: 100.0 },
            '3 对 - 大天使': { prob: 0.15, avgScore: 145.0 },
            '3 顺 - 国王象棋': { prob: 0.08, avgScore: 75.0 }
        };

        const COMBO_RULES = [
            { id: 'pair_3', name: '3 对 - 大天使', baseScore: 145 },
            { id: 'pair_2', name: '2 对 - 小米兰', baseScore: 25 },
            { id: 'seq_7', name: '7 顺 - 睡莲', baseScore: 1000 },
            { id: 'seq_6', name: '6 顺 - 睡莲', baseScore: 400 },
            { id: 'seq_5', name: '5 顺 - 熊猫', baseScore: 400 },
            { id: 'seq_3_king', name: '3 顺 - 国王象棋', baseScore: 75 },
            { id: 'seq_3', name: '3 顺 - 南瓜', baseScore: 33 },
            { id: 'seq_4', name: '4 顺 - 可口可乐', baseScore: 2.5 },
            { id: 'triplet_4', name: '4 豹 - 情人节限定', baseScore: 100 },
            { id: 'triplet_3', name: '3 豹 - IGO', baseScore: 2.5 },
            { id: 'tile_5', name: '马卡龙', baseScore: 10, tile: '5筒' },
            { id: 'tile_7', name: '妹宝烘培', baseScore: 5, tile: '7筒' },
            { id: 'word_zhong', name: '我是大 boos', baseScore: 5, tile: '红中' },
            { id: 'word_beifeng', name: '我爱吃果果', baseScore: 5, tile: '北风' },
            { id: 'word_xifeng', name: 'MIGO', baseScore: 2.5, tile: '西风' },
            { id: 'word_baiban', name: 'MIGO', baseScore: 2.5, tile: '白板' }
        ];

        let prizeMultipliers = { ...DEFAULT_PRIZES };

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            event.target.classList.add('active');
        }

        class MahjongGame {
            constructor() {
                this.tiles = [];
                this.revealed = [];
                this.selected = [];
                this.balance = 1000;
                this.totalWin = 0;
                this.revealCount = 0;
                this.combos = 0;
                this.init();
                this.renderPrizeConfig();
                this.renderStats();
                this.calculateExpectation();
            }

            init() {
                this.createTiles();
                this.renderBoard();
                this.updateInfo();
            }

            createTiles() {
                this.tiles = [];
                let id = 0;

                const wordTiles = [
                    { value: '东', label: '东风' },
                    { value: '南', label: '南风' },
                    { value: '西', label: '西风' },
                    { value: '北', label: '北风' },
                    { value: '中', label: '红中' },
                    { value: '发', label: '发财' },
                    { value: '白', label: '白板' }
                ];
                
                wordTiles.forEach(tile => {
                    for (let i = 0; i < 4; i++) {
                        this.tiles.push({ id: id++, value: tile.value, label: tile.label, type: 'word', revealed: false, matched: false });
                    }
                });

                const bambooTiles = ['一', '二', '三', '四', '五', '六', '七', '八', '九'];
                bambooTiles.forEach((tile, index) => {
                    for (let i = 0; i < 4; i++) {
                        this.tiles.push({ id: id++, value: tile, label: (index + 1) + '筒', type: 'bamboo', number: index + 1, revealed: false, matched: false });
                    }
                });

                this.shuffleTiles();
            }

            shuffleTiles() {
                for (let i = this.tiles.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.tiles[i], this.tiles[j]] = [this.tiles[j], this.tiles[i]];
                }
            }

            renderBoard() {
                const board = document.getElementById('board');
                board.innerHTML = '';
                this.tiles.forEach((tile, index) => {
                    if (tile.matched) return;
                    const tileEl = document.createElement('div');
                    tileEl.className = `tile type-${tile.type}${tile.revealed ? ' revealed' : ''}${this.selected.includes(index) ? ' selected' : ''}`;
                    if (!tile.revealed) tileEl.onclick = () => this.selectTile(index);
                    tileEl.innerHTML = `<div class="tile-content">${tile.value}</div><div class="tile-label">${tile.label}</div>`;
                    board.appendChild(tileEl);
                });
            }

            revealTiles() {
                const hiddenTiles = this.tiles.filter(t => !t.revealed && !t.matched);
                if (hiddenTiles.length === 0) {
                    this.showMessage('所有牌都已翻开！');
                    return;
                }

                let canReveal = 0, cost = 0;
                if (this.revealCount === 0) {
                    canReveal = Math.min(3, hiddenTiles.length);
                    cost = 50;
                } else {
                    canReveal = Math.min(Math.floor(this.balance / 10), hiddenTiles.length);
                    cost = canReveal * 10;
                }

                if (canReveal === 0 || this.balance < cost) {
                    this.showMessage('💸 余额不足！');
                    return;
                }

                this.balance -= cost;
                this.revealCount += canReveal;
                hiddenTiles.slice(0, canReveal).forEach(tile => tile.revealed = true);

                this.renderBoard();
                this.updateInfo();
                this.showMessage(`👁️ 已翻开 ${canReveal} 张牌，花费 ${cost}元`);

                const revealedUnmatched = this.tiles.filter(t => t.revealed && !t.matched);
                document.getElementById('btn-check').disabled = revealedUnmatched.length < 2;
                
                const nextCost = this.revealCount === 0 ? 50 : 10;
                document.getElementById('btn-reveal').textContent = `👁️ 看牌 (${nextCost}元/${this.revealCount === 0 ? '3 张' : '1 张'})`;
            }

            selectTile(index) {
                const tile = this.tiles[index];
                if (!tile.revealed || tile.matched) return;
                const pos = this.selected.indexOf(index);
                if (pos > -1) this.selected.splice(pos, 1);
                else if (this.selected.length < 7) this.selected.push(index);
                this.renderBoard();
            }

            checkCombo() {
                const selectedTiles = this.selected.map(i => this.tiles[i]);
                if (selectedTiles.length < 2) {
                    this.showMessage('至少选择 2 张牌！');
                    return;
                }

                let comboFound = null, comboScore = 0;

                const pairs = this.findPairs(selectedTiles);
                if (pairs.length >= 3) { comboFound = COMBO_RULES.find(r => r.id === 'pair_3'); comboScore = prizeMultipliers[comboFound.name] || 145; }
                else if (pairs.length >= 2) { comboFound = COMBO_RULES.find(r => r.id === 'pair_2'); comboScore = prizeMultipliers[comboFound.name] || 25; }

                const triplets = this.findTriplets(selectedTiles);
                if (triplets.length > 0) {
                    const count = triplets[0].length;
                    if (count >= 4) { comboFound = COMBO_RULES.find(r => r.id === 'triplet_4'); comboScore = prizeMultipliers[comboFound.name] || 100; }
                    else if (count >= 3) { comboFound = COMBO_RULES.find(r => r.id === 'triplet_3'); comboScore = prizeMultipliers[comboFound.name] || 2.5; }
                }

                const sequence = this.findSequence(selectedTiles);
                if (sequence.length >= 3) {
                    const seqScores = { 7: ['seq_7', 1000], 6: ['seq_6', 400], 5: ['seq_5', 400], 4: ['seq_4', 2.5], 3: ['seq_3', 33] };
                    const [id, score] = seqScores[sequence.length] || [];
                    comboFound = COMBO_RULES.find(r => r.id === id);
                    comboScore = prizeMultipliers[comboFound.name] || score;
                }

                if (!comboFound) {
                    const special = this.checkSpecialTiles(selectedTiles);
                    if (special) { comboFound = special.rule; comboScore = prizeMultipliers[comboFound.name] || special.rule.baseScore; }
                }

                if (comboFound && comboScore > 0) {
                    this.balance += comboScore;
                    this.totalWin += comboScore;
                    this.combos++;
                    this.selected.forEach(index => this.tiles[index].matched = true);
                    this.showMessage(`🎉 ${comboFound.name}\n💰 +${comboScore}元!`);
                    this.selected = [];
                    this.renderBoard();
                    this.updateInfo();
                } else {
                    this.showMessage('❌ 未找到有效组合！');
                    this.selected = [];
                    this.renderBoard();
                }

                const revealedUnmatched = this.tiles.filter(t => t.revealed && !t.matched);
                document.getElementById('btn-check').disabled = revealedUnmatched.length < 2;
            }

            findPairs(tiles) {
                const count = {};
                tiles.forEach(tile => { const key = tile.value + tile.type; count[key] = (count[key] || 0) + 1; });
                return Object.entries(count).filter(([_, c]) => c >= 2);
            }

            findTriplets(tiles) {
                const count = {};
                tiles.forEach(tile => { const key = tile.value + tile.type; count[key] = (count[key] || 0) + 1; });
                return Object.entries(count).filter(([_, c]) => c >= 3);
            }

            findSequence(tiles) {
                const bamboo = tiles.filter(t => t.type === 'bamboo');
                if (bamboo.length < 3) return [];
                const numbers = [...new Set(bamboo.map(t => t.number))].sort((a, b) => a - b);
                let maxSeq = 1, currentSeq = 1;
                for (let i = 1; i < numbers.length; i++) {
                    if (numbers[i] === numbers[i-1] + 1) { currentSeq++; maxSeq = Math.max(maxSeq, currentSeq); }
                    else currentSeq = 1;
                }
                return maxSeq >= 3 ? maxSeq : 0;
            }

            checkSpecialTiles(tiles) {
                const special = { '5筒': 'tile_5', '7筒': 'tile_7', '红中': 'word_zhong', '北风': 'word_beifeng', '西风': 'word_xifeng', '白板': 'word_baiban' };
                for (const [label, id] of Object.entries(special)) {
                    if (tiles.some(t => t.label === label)) return { rule: COMBO_RULES.find(r => r.id === id) };
                }
                return null;
            }

            updateInfo() {
                document.getElementById('balance').textContent = this.balance.toFixed(0);
                document.getElementById('total-win').textContent = this.totalWin.toFixed(0);
                document.getElementById('current-cost').textContent = this.revealCount === 0 ? 50 : 10;
                document.getElementById('revealed-count').textContent = this.revealCount;
                document.getElementById('combos').textContent = this.combos;
                document.getElementById('hidden-count').textContent = this.tiles.filter(t => !t.revealed && !t.matched).length;
                
                const nextCost = this.revealCount === 0 ? 50 : 10;
                const btn = document.getElementById('btn-reveal');
                btn.textContent = `👁️ 看牌 (${nextCost}元/${this.revealCount === 0 ? '3 张' : '1 张'})`;
                btn.disabled = this.balance < nextCost;
            }

            showMessage(text) {
                const msg = document.getElementById('message');
                msg.innerHTML = text.replace(/\n/g, '<br>');
                msg.style.display = 'block';
                setTimeout(() => msg.style.display = 'none', 2000);
            }

            startNewGame() {
                this.tiles = [];
                this.revealed = [];
                this.selected = [];
                this.balance = 1000;
                this.totalWin = 0;
                this.revealCount = 0;
                this.combos = 0;
                this.createTiles();
                this.renderBoard();
                this.updateInfo();
                document.getElementById('btn-check').disabled = true;
                this.showMessage('🎮 新游戏开始！');
            }

            renderPrizeConfig() {
                const container = document.getElementById('prize-config');
                container.innerHTML = Object.entries(prizeMultipliers).map(([name, mult]) => `
                    <div class="prize-item">
                        <label>${name}</label>
                        <input type="number" id="prize-${name.replace(/\s/g, '-')}" value="${mult}" step="0.5" min="0">
                    </div>
                `).join('');
            }

            savePrizeConfig() {
                Object.keys(prizeMultipliers).forEach(name => {
                    const input = document.getElementById(`prize-${name.replace(/\s/g, '-')}`);
                    if (input) prizeMultipliers[name] = parseFloat(input.value) || 0;
                });
                this.calculateExpectation();
                this.showMessage('💾 设置已保存！');
            }

            resetPrizeConfig() {
                prizeMultipliers = { ...DEFAULT_PRIZES };
                this.renderPrizeConfig();
                this.calculateExpectation();
                this.showMessage('🔄 已重置为默认值！');
            }

            calculateExpectation() {
                let expectedWin = 0;
                Object.entries(PROBABILITY_DATA).forEach(([name, data]) => {
                    const mult = prizeMultipliers[name] || 0;
                    expectedWin += (data.prob / 100) * data.avgScore * mult;
                });
                const avgCost = 677;
                const expectedNet = expectedWin - avgCost;
                const rtp = (expectedWin / avgCost * 100);
                
                document.getElementById('expected-net').textContent = `${expectedNet >= 0 ? '+' : ''}${expectedNet.toFixed(2)}元`;
                document.getElementById('expected-net').style.color = expectedNet >= 0 ? '#00ff88' : '#ff6b6b';
                document.getElementById('rtp-value').textContent = `${rtp.toFixed(2)}%`;
            }

            renderStats() {
                const container = document.getElementById('stats-grid');
                container.innerHTML = Object.entries(PROBABILITY_DATA).map(([name, data]) => `
                    <div class="stat-item">
                        <div class="stat-label">${name}</div>
                        <div class="stat-value">${data.prob.toFixed(3)}%</div>
                        <div style="color:#aaa;font-size:0.8em">均分：${data.avgScore}</div>
                    </div>
                `).join('');
            }
        }

        const game = new MahjongGame();
    </script>
</body>
</html>
