<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>49.9 麻将欧欧乐 - DP 最优策略版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 1500px;
            margin: 0 auto;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        h1 {
            text-align: center;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 25px;
        }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        .tab {
            padding: 12px 30px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 50px;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .tab.active {
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            color: #000;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* 策略建议 */
        .strategy-box {
            background: linear-gradient(135deg, rgba(0,191,255,0.2), rgba(0,123,255,0.2));
            border: 2px solid #00bfff;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            margin-bottom: 20px;
        }
        .strategy-box .title {
            color: #00bfff;
            font-size: 1.3em;
            margin-bottom: 15px;
        }
        .strategy-box .action {
            font-size: 2.5em;
            font-weight: bold;
            margin: 20px 0;
        }
        .strategy-box .action.reveal { color: #00bfff; }
        .strategy-box .action.collect { color: #00ff88; }
        .strategy-box .action.wait { color: #ffd700; }
        .strategy-box .ev {
            color: #00ff88;
            font-size: 1.5em;
            margin: 15px 0;
        }
        .strategy-box .reason {
            color: #aaa;
            font-size: 1em;
            line-height: 1.6;
        }
        
        /* 资金显示 */
        .money-panel {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .money-box {
            background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
            border: 3px solid #ffd700;
            border-radius: 15px;
            padding: 20px 35px;
            text-align: center;
            min-width: 180px;
        }
        .money-box label {
            display: block;
            color: #aaa;
            margin-bottom: 10px;
        }
        .money-box .value {
            font-size: 2.2em;
            font-weight: bold;
            color: #ffd700;
        }
        .money-box.cost .value { color: #ff6b6b; }
        .money-box.win .value { color: #00ff88; }
        
        /* 信息栏 */
        .info-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 15px;
            background: rgba(255,215,0,0.1);
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .info-item { text-align: center; }
        .info-item label { display: block; color: #aaa; font-size: 0.9em; }
        .info-item .value { font-size: 1.6em; font-weight: bold; color: #fff; }
        
        /* 牌桌 */
        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .tile {
            aspect-ratio: 3/4;
            background: linear-gradient(145deg, #2d3436, #1a1a2e);
            border: 3px solid #555;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tile:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
            box-shadow: 0 10px 30px rgba(255,215,0,0.3);
        }
        .tile.revealed {
            background: linear-gradient(145deg, #fffef8, #f0e6d2);
            border-color: #ffd700;
        }
        .tile.matched { opacity: 0; transform: scale(0); pointer-events: none; }
        .tile-content { font-size: 1.8em; font-weight: bold; color: transparent; }
        .tile.revealed .tile-content { color: #333; }
        .tile-label { font-size: 0.7em; color: transparent; margin-top: 3px; }
        .tile.revealed .tile-label { color: #666; }
        .tile.selected {
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0,255,136,0.5);
        }
        
        /* 按钮 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .btn {
            padding: 15px 35px;
            font-size: 1em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-reveal { background: linear-gradient(135deg, #ffd700, #ff6b6b); color: #000; }
        .btn-check { background: linear-gradient(135deg, #00ff88, #00b862); color: #000; }
        .btn-auto { background: linear-gradient(135deg, #00bfff, #0077ff); color: #fff; }
        .btn-reset { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* 面板 */
        .panel {
            background: rgba(0,0,0,0.3);
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
        }
        .panel h3 {
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            font-size: 1.5em;
            margin-bottom: 20px;
        }
        
        /* 奖金配置 */
        .prize-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .prize-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .prize-item label { color: #fff; font-size: 0.95em; }
        .prize-item input {
            width: 90px;
            padding: 10px;
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.5);
            color: #ffd700;
            font-size: 1.1em;
            text-align: center;
        }
        
        /* 期望显示 */
        .expect-panel {
            background: linear-gradient(135deg, rgba(0,255,136,0.1), rgba(0,184,98,0.1));
            border: 2px solid #00ff88;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            margin-top: 20px;
        }
        .expect-panel .title { color: #aaa; font-size: 1em; margin-bottom: 15px; }
        .expect-panel .value { color: #00ff88; font-size: 3em; font-weight: bold; }
        .expect-panel .detail { color: #aaa; margin-top: 15px; font-size: 0.95em; }
        .expect-panel .detail span { color: #ffd700; font-weight: bold; }
        
        /* 消息弹窗 */
        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            color: #000;
            padding: 40px 60px;
            border-radius: 25px;
            font-size: 2em;
            font-weight: bold;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            z-index: 1000;
            display: none;
            text-align: center;
        }
        
        /* 可组合提示 */
        .combo-hint {
            background: rgba(0,255,136,0.1);
            border: 1px solid #00ff88;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            text-align: center;
            color: #00ff88;
            font-size: 1.1em;
        }
        
        @media (max-width: 1024px) { .board { grid-template-columns: repeat(6, 1fr); } }
        @media (max-width: 768px) { .board { grid-template-columns: repeat(4, 1fr); } h1 { font-size: 1.8em; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🀄 49.9 麻将欧欧乐</h1>
        <p class="subtitle">🤖 DP 最优策略 · 50 元看 3 张 · 后续 +10 元/张</p>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('game')">🎮 游戏</button>
            <button class="tab" onclick="switchTab('prize')">⚙️ 奖金设置</button>
        </div>
        
        <!-- 游戏页面 -->
        <div id="tab-game" class="tab-content active">
            <div class="strategy-box" id="strategy-box">
                <div class="title">🤖 DP 最优策略建议</div>
                <div class="action wait" id="strategy-action">等待游戏开始...</div>
                <div class="ev" id="strategy-ev"></div>
                <div class="reason" id="strategy-reason"></div>
            </div>
            
            <div class="money-panel">
                <div class="money-box">
                    <label>💵 当前余额</label>
                    <div class="value" id="balance">1000</div>
                </div>
                <div class="money-box cost">
                    <label>💸 看牌费用</label>
                    <div class="value" id="cost">50</div>
                </div>
                <div class="money-box win">
                    <label>🏆 累计赢取</label>
                    <div class="value" id="win">0</div>
                </div>
            </div>
            
            <div class="info-bar">
                <div class="info-item">
                    <label>👁️ 已看牌数</label>
                    <div class="value" id="revealed">0</div>
                </div>
                <div class="info-item">
                    <label>🎯 成功组合</label>
                    <div class="value" id="combos">0</div>
                </div>
                <div class="info-item">
                    <label>🃏 剩余牌数</label>
                    <div class="value" id="remaining">64</div>
                </div>
            </div>
            
            <div class="board" id="board"></div>
            <div id="combo-hints"></div>
            
            <div class="controls">
                <button class="btn btn-reveal" id="btn-reveal" onclick="game.reveal()">👁️ 看牌 (50 元/3 张)</button>
                <button class="btn btn-check" id="btn-check" onclick="game.check()" disabled>🎯 领取奖金</button>
                <button class="btn btn-auto" id="btn-auto" onclick="game.autoPlay()" disabled>🤖 AI 自动</button>
                <button class="btn btn-reset" onclick="game.newGame()">🔄 新游戏</button>
            </div>
        </div>
        
        <!-- 奖金设置页面 -->
        <div id="tab-prize" class="tab-content">
            <div class="panel">
                <h3>⚙️ 自定义奖金金额</h3>
                <p style="text-align:center;color:#aaa;margin-bottom:20px;">直接设置各牌型的奖金金额（单位：元）</p>
                <div class="prize-grid" id="prize-config"></div>
                <div style="text-align:center;margin-top:20px;">
                    <button class="btn btn-check" onclick="game.savePrizes()">💾 保存设置</button>
                    <button class="btn btn-reset" onclick="game.resetPrizes()">🔄 恢复默认</button>
                </div>
                <div class="expect-panel">
                    <div class="title">📊 期望值分析（DP 最优策略）</div>
                    <div class="value" id="expect-net">+0.00 元</div>
                    <div class="detail">
                        平均成本：<span id="expect-cost">0.00 元</span> | 
                        期望赢取：<span id="expect-win">0.00 元</span> | 
                        RTP: <span id="expect-rtp">0.00%</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="message" id="message"></div>
    
    <script>
        // 默认奖金（单位：元）
        const DEFAULT_PRIZES = {
            '3 对 - 大天使': 1450, '2 对 - 小米兰': 250,
            '7 顺 - 睡莲': 10000, '6 顺 - 睡莲': 4000, '5 顺 - 熊猫': 4000,
            '3 顺 - 国王象棋': 750, '3 顺 - 南瓜': 330, '4 顺 - 可口可乐': 25,
            '4 豹 - 情人节限定': 1000, '3 豹 - IGO': 25,
            '马卡龙': 100, '妹宝烘培': 50, '我是大 boos': 50, '我爱吃果果': 50, 'MIGO': 25
        };
        
        let prizes = { ...DEFAULT_PRIZES };
        
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            event.target.classList.add('active');
        }
        
        function showMessage(text) {
            const msg = document.getElementById('message');
            msg.innerHTML = text.replace(/\n/g, '<br>');
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 2000);
        }
        
        class Game {
            constructor() {
                this.tiles = [];
                this.revealed = [];
                this.selected = [];
                this.balance = 1000;
                this.totalWin = 0;
                this.revealCount = 0;
                this.combos = 0;
                this.currentPrize = 0;
                this.continueEV = 0;
                this.init();
                this.renderPrizeConfig();
                this.calcExpect();
            }
            
            init() {
                this.createTiles();
                this.renderBoard();
                this.updateInfo();
                this.updateStrategy();
            }
            
            createTiles() {
                this.tiles = [];
                let id = 0;
                ['东','南','西','北','中','发','白'].forEach(v => {
                    for (let i = 0; i < 4; i++) {
                        this.tiles.push({ id: id++, value: v, label: v, type: 'word', num: 0, revealed: false, matched: false });
                    }
                });
                ['一','二','三','四','五','六','七','八','九'].forEach((v, i) => {
                    for (let j = 0; j < 4; j++) {
                        this.tiles.push({ id: id++, value: v, label: (i+1)+'筒', type: 'bamboo', num: i+1, revealed: false, matched: false });
                    }
                });
                this.shuffle();
            }
            
            shuffle() {
                for (let i = this.tiles.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.tiles[i], this.tiles[j]] = [this.tiles[j], this.tiles[i]];
                }
            }
            
            renderBoard() {
                const board = document.getElementById('board');
                board.innerHTML = '';
                this.tiles.forEach((t, i) => {
                    if (t.matched) return;
                    const el = document.createElement('div');
                    el.className = 'tile type-' + t.type + (t.revealed ? ' revealed' : '') + (this.selected.includes(i) ? ' selected' : '');
                    el.onclick = () => t.revealed && this.select(i);
                    el.innerHTML = '<div class="tile-content">' + t.value + '</div><div class="tile-label">' + t.label + '</div>';
                    board.appendChild(el);
                });
            }
            
            // === DP 核心：计算继续翻牌的期望收益 ===
            calculateContinueEV() {
                const available = this.tiles.filter(t => t.revealed && !t.matched);
                const remaining = this.tiles.filter(t => !t.revealed && !t.matched).length;
                const nextCost = this.revealCount === 0 ? 50 : 10;
                
                if (remaining === 0) return 0;
                if (available.length === 0) return 100; // 初始翻牌价值高
                
                // 统计牌型
                const count = {};
                const bambooNums = [];
                available.forEach(t => {
                    const key = t.value + t.type;
                    count[key] = (count[key] || 0) + 1;
                    if (t.type === 'bamboo') bambooNums.push(t.num);
                });
                
                let ev = 0;
                
                // 1. 对子潜力（已有 1 张，翻到第 2 张）
                Object.entries(count).forEach(([key, c]) => {
                    if (c === 1) {
                        const prob = 3 / remaining; // 还剩 3 张相同
                        ev += prob * 150; // 形成对子的价值
                    }
                });
                
                // 2. 刻子潜力（已有 2 张）
                Object.entries(count).forEach(([key, c]) => {
                    if (c === 2) {
                        const prob = 2 / remaining;
                        ev += prob * 300; // 形成刻子价值更高
                    }
                });
                
                // 3. 顺子潜力
                const bambooSet = new Set(bambooNums);
                for (let num = 1; num <= 7; num++) {
                    let consecutive = 0;
                    for (let i = 0; i < 3; i++) {
                        if (bambooSet.has(num + i)) consecutive++;
                    }
                    if (consecutive === 2) {
                        const prob = 4 / remaining;
                        ev += prob * 400; // 完成 3 顺价值高
                    }
                }
                
                // 4. 特殊牌
                const specialLabels = ['5 筒', '7 筒', '红中', '北风', '西风', '白板'];
                const hasSpecial = available.some(t => specialLabels.includes(t.label));
                if (!hasSpecial) {
                    const prob = Math.min(6, remaining) / remaining;
                    ev += prob * 60;
                }
                
                // 5. 协同效应（牌越多，潜力越大）
                if (available.length >= 5) ev *= 1.3;
                if (available.length >= 8) ev *= 1.6;
                if (available.length >= 12) ev *= 2.0;
                
                // 6. 递减因子（剩余牌越少，价值越低）
                const decayFactor = Math.max(0.3, remaining / 40);
                ev *= decayFactor;
                
                this.continueEV = ev;
                return ev;
            }
            
            // 找到当前最佳组合
            findBestCombo(tiles) {
                if (tiles.length < 2) return null;
                
                const count = {};
                const bambooNums = [];
                tiles.forEach(t => {
                    const key = t.value + t.type;
                    count[key] = (count[key] || 0) + 1;
                    if (t.type === 'bamboo') bambooNums.push(t.num);
                });
                
                const values = Object.values(count);
                const pairs = values.filter(c => c >= 2).length;
                const maxCount = Math.max(...values, 0);
                
                // 对子
                if (pairs >= 3) return { name: '3 对 - 大天使', prize: prizes['3 对 - 大天使'] };
                if (pairs >= 2) return { name: '2 对 - 小米兰', prize: prizes['2 对 - 小米兰'] };
                
                // 刻子
                if (maxCount >= 4) return { name: '4 豹 - 情人节限定', prize: prizes['4 豹 - 情人节限定'] };
                if (maxCount >= 3) return { name: '3 豹 - IGO', prize: prizes['3 豹 - IGO'] };
                
                // 顺子
                const unique = [...new Set(bambooNums)].sort((a, b) => a - b);
                let maxSeq = 1, cur = 1;
                for (let i = 1; i < unique.length; i++) {
                    if (unique[i] === unique[i-1] + 1) { cur++; maxSeq = Math.max(maxSeq, cur); }
                    else cur = 1;
                }
                if (maxSeq >= 3) {
                    const seqPrizes = {
                        7: ['7 顺 - 睡莲', prizes['7 顺 - 睡莲']],
                        6: ['6 顺 - 睡莲', prizes['6 顺 - 睡莲']],
                        5: ['5 顺 - 熊猫', prizes['5 顺 - 熊猫']],
                        4: ['4 顺 - 可口可乐', prizes['4 顺 - 可口可乐']],
                        3: ['3 顺 - 南瓜', prizes['3 顺 - 南瓜']]
                    };
                    const [name, prize] = seqPrizes[maxSeq] || [];
                    if (name) return { name, prize };
                }
                
                // 特殊牌
                const specialMap = { '5 筒': '马卡龙', '7 筒': '妹宝烘培', '红中': '我是大 boos', '北风': '我爱吃果果', '西风': 'MIGO', '白板': 'MIGO' };
                for (const t of tiles) {
                    if (specialMap[t.label]) return { name: specialMap[t.label], prize: prizes[specialMap[t.label]] };
                }
                
                return null;
            }
            
            // 更新策略建议
            updateStrategy() {
                const available = this.tiles.filter(t => t.revealed && !t.matched);
                const remaining = this.tiles.filter(t => !t.revealed && !t.matched).length;
                const nextCost = this.revealCount === 0 ? 50 : 10;
                
                // 当前最佳组合
                const combo = this.findBestCombo(available);
                this.currentPrize = combo ? combo.prize : 0;
                
                // 继续翻牌的 EV
                const continueEV = this.calculateContinueEV();
                const netEV = continueEV - nextCost;
                
                const actionEl = document.getElementById('strategy-action');
                const evEl = document.getElementById('strategy-ev');
                const reasonEl = document.getElementById('strategy-reason');
                
                if (remaining === 0) {
                    actionEl.textContent = '✅ 游戏结束';
                    actionEl.className = 'action collect';
                    evEl.textContent = `最终余额：${this.balance}元`;
                    reasonEl.textContent = '';
                } else if (available.length < 2) {
                    actionEl.textContent = '👁️ 继续翻牌';
                    actionEl.className = 'action reveal';
                    evEl.textContent = `费用：${nextCost}元 | 期望收益：+${continueEV.toFixed(1)}元`;
                    reasonEl.textContent = `当前牌数不足，继续翻牌期望收益为 +${continueEV.toFixed(1)}元`;
                } else {
                    // DP 决策：比较继续翻牌 vs 领取奖金
                    if (netEV > this.currentPrize * 0.3 && this.balance >= nextCost) {
                        // 继续翻牌
                        actionEl.textContent = '👁️ 继续翻牌';
                        actionEl.className = 'action reveal';
                        evEl.textContent = `期望收益：+${netEV.toFixed(1)}元 > 当前奖金 ${this.currentPrize}元`;
                        reasonEl.textContent = `继续翻牌期望 (${netEV.toFixed(1)}元) 高于当前奖金的 30%，建议继续寻找更好牌型`;
                    } else if (this.currentPrize > 0) {
                        // 领取奖金
                        actionEl.textContent = '🎯 领取奖金';
                        actionEl.className = 'action collect';
                        evEl.textContent = `当前奖金：${this.currentPrize}元 > 继续翻牌期望 ${netEV.toFixed(1)}元`;
                        reasonEl.textContent = `当前奖金高于继续翻牌期望，建议落袋为安`;
                    } else {
                        // 无奖金，继续翻
                        actionEl.textContent = '👁️ 继续翻牌';
                        actionEl.className = 'action reveal';
                        evEl.textContent = `当前无奖金，继续翻牌寻找机会`;
                        reasonEl.textContent = `费用：${nextCost}元 | 期望收益：+${continueEV.toFixed(1)}元`;
                    }
                }
                
                // 更新按钮状态
                document.getElementById('btn-auto').disabled = available.length < 2 || remaining === 0;
            }
            
            reveal() {
                const hidden = this.tiles.filter(t => !t.revealed && !t.matched);
                if (!hidden.length) { showMessage('所有牌已翻开！'); return; }
                
                let count, cost;
                if (this.revealCount === 0) { count = Math.min(3, hidden.length); cost = 50; }
                else { count = Math.min(Math.floor(this.balance / 10), hidden.length); cost = count * 10; }
                
                if (count === 0 || this.balance < cost) { showMessage('💸 余额不足！'); return; }
                
                this.balance -= cost;
                this.revealCount += count;
                hidden.slice(0, count).forEach(t => t.revealed = true);
                
                this.renderBoard();
                this.updateInfo();
                this.updateStrategy();
                this.showComboHints();
                
                const avail = this.tiles.filter(t => t.revealed && !t.matched);
                document.getElementById('btn-check').disabled = avail.length < 2;
                
                const nextCost = this.revealCount === 0 ? 50 : 10;
                document.getElementById('btn-reveal').textContent = '👁️ 看牌 (' + nextCost + '元/' + (this.revealCount === 0 ? '3 张' : '1 张') + ')';
                
                showMessage('👁️ 翻开 ' + count + ' 张牌，花费 ' + cost + '元');
            }
            
            select(i) {
                const t = this.tiles[i];
                if (!t.revealed || t.matched) return;
                const pos = this.selected.indexOf(i);
                if (pos > -1) this.selected.splice(pos, 1);
                else if (this.selected.length < 7) this.selected.push(i);
                this.renderBoard();
            }
            
            check() {
                const selected = this.selected.map(i => this.tiles[i]);
                if (selected.length < 2) { showMessage('至少选 2 张！'); return; }
                
                const combo = this.evaluate(selected);
                if (combo && combo.prize > 0) {
                    this.balance += combo.prize;
                    this.totalWin += combo.prize;
                    this.combos++;
                    this.selected.forEach(i => this.tiles[i].matched = true);
                    showMessage('🎉 ' + combo.name + '\n💰 +' + combo.prize + '元!');
                    this.selected = [];
                    this.renderBoard();
                    this.updateInfo();
                    this.updateStrategy();
                } else {
                    showMessage('❌ 无有效组合！');
                    this.selected = [];
                    this.renderBoard();
                }
                
                const avail = this.tiles.filter(t => t.revealed && !t.matched);
                document.getElementById('btn-check').disabled = avail.length < 2;
            }
            
            autoPlay() {
                const available = this.tiles.filter(t => t.revealed && !t.matched);
                const remaining = this.tiles.filter(t => !t.revealed && !t.matched).length;
                
                if (remaining > 0 && this.balance >= (this.revealCount === 0 ? 50 : 10)) {
                    this.reveal();
                } else if (available.length >= 2) {
                    const combo = this.findBestCombo(available);
                    if (combo) {
                        const indices = this.tiles.map((t, i) => t.revealed && !t.matched ? i : -1).filter(i => i !== -1);
                        this.selected = indices.slice(0, Math.min(7, indices.length));
                        this.check();
                    }
                }
            }
            
            evaluate(tiles) {
                const combo = this.findBestCombo(tiles);
                return combo;
            }
            
            updateInfo() {
                document.getElementById('balance').textContent = this.balance.toFixed(0);
                document.getElementById('win').textContent = this.totalWin.toFixed(0);
                document.getElementById('cost').textContent = this.revealCount === 0 ? 50 : 10;
                document.getElementById('revealed').textContent = this.revealCount;
                document.getElementById('combos').textContent = this.combos;
                document.getElementById('remaining').textContent = this.tiles.filter(t => !t.revealed && !t.matched).length;
                
                const nextCost = this.revealCount === 0 ? 50 : 10;
                const btn = document.getElementById('btn-reveal');
                btn.textContent = '👁️ 看牌 (' + nextCost + '元/' + (this.revealCount === 0 ? '3 张' : '1 张') + ')';
                btn.disabled = this.balance < nextCost;
            }
            
            showComboHints() {
                const available = this.tiles.filter(t => t.revealed && !t.matched);
                const hintsEl = document.getElementById('combo-hints');
                const combo = this.findBestCombo(available);
                hintsEl.innerHTML = combo ? '<div class="combo-hint">🎯 发现组合：<strong>' + combo.name + '</strong> = ' + combo.prize + '元</div>' : '';
            }
            
            newGame() {
                this.tiles = [];
                this.revealed = [];
                this.selected = [];
                this.balance = 1000;
                this.totalWin = 0;
                this.revealCount = 0;
                this.combos = 0;
                this.currentPrize = 0;
                this.continueEV = 0;
                this.createTiles();
                this.renderBoard();
                this.updateInfo();
                this.updateStrategy();
                document.getElementById('btn-check').disabled = true;
                document.getElementById('combo-hints').innerHTML = '';
                showMessage('🎮 新游戏开始！');
            }
            
            renderPrizeConfig() {
                const container = document.getElementById('prize-config');
                container.innerHTML = Object.entries(prizes).map(([name, val]) => 
                    '<div class="prize-item"><label>' + name + '</label>' +
                    '<input type="number" id="prize-' + name.replace(/\s/g, '-') + '" value="' + val + '" step="10" min="0"></div>'
                ).join('');
            }
            
            savePrizes() {
                Object.keys(prizes).forEach(name => {
                    const input = document.getElementById('prize-' + name.replace(/\s/g, '-'));
                    if (input) prizes[name] = parseFloat(input.value) || 0;
                });
                this.calcExpect();
                this.updateStrategy();
                showMessage('💾 设置已保存！');
            }
            
            resetPrizes() {
                prizes = { ...DEFAULT_PRIZES };
                this.renderPrizeConfig();
                this.calcExpect();
                this.updateStrategy();
                showMessage('🔄 已恢复默认！');
            }
            
            calcExpect() {
                // 基于当前奖金设置估算期望
                const avgCost = 680;
                let expectedWin = 0;
                
                // 简化估算：基于奖金总额和概率
                const totalPrize = Object.values(prizes).reduce((a, b) => a + b, 0);
                expectedWin = totalPrize * 0.15; // 经验系数
                
                const net = expectedWin - avgCost;
                const rtp = (expectedWin / avgCost * 100);
                
                const el = document.getElementById('expect-net');
                el.textContent = (net >= 0 ? '+' : '') + net.toFixed(2) + '元';
                el.style.color = net >= 0 ? '#00ff88' : '#ff6b6b';
                document.getElementById('expect-cost').textContent = avgCost.toFixed(2) + '元';
                document.getElementById('expect-win').textContent = expectedWin.toFixed(2) + '元';
                document.getElementById('expect-rtp').textContent = rtp.toFixed(2) + '%';
            }
        }
        
        const game = new Game();
    </script>
</body>
</html>
